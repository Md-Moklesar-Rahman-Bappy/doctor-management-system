<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .prescription-card {
            width: 600px;
            margin: 20px auto;
            background: #fff;
            padding: 40px;
            border-top: 10px solid #0056b3; /* Professional Medical Blue */
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .doc-details h2 { margin: 0; color: #0056b3; }
        .doc-details p { margin: 2px 0; font-size: 14px; color: #666; }
        
        .patient-bar { display: flex; justify-content: space-between; margin-top: 20px; font-size: 14px; }
        .input-line { border-bottom: 1px solid #ccc; flex-grow: 1; margin-left: 10px; }

        .rx-symbol { font-size: 50px; color: #0056b3; margin: 30px 0; font-family: serif; }
        .content-area { height: 350px; border-left: 1px solid #eee; padding-left: 20px; }

        .footer { margin-top: 40px; border-top: 1px solid #eee; padding-top: 15px; display: flex; justify-content: space-between; font-size: 12px; color: #888; }
        .sig { text-align: right; margin-top: 50px; }
        .sig-line { border-top: 1px solid #333; width: 200px; display: inline-block; padding-top: 5px; }
    </style>
</head>
<body>
    <div class="prescription-card">
        <div class="header">
            <div class="doc-details">
                <h2>Dr. Jane Smith, MD</h2>
                <p>Internal Medicine | License #987654321</p>
                <p>123 Medical Plaza, Health City, NY</p>
            </div>
        </div>
        
        <div class="patient-bar">
            <div style="width: 50%;">Name: <span class="input-line"></span></div>
            <div style="width: 20%;">Age: <span class="input-line"></span></div>
            <div style="width: 25%;">Date: <span class="input-line"></span></div>
        </div>

        <div class="rx-symbol">Rx</div>
        <div class="content-area">
            <!-- Prescription notes go here -->
        </div>

        <div class="sig">
            <span class="sig-line">Doctor's Signature</span>
        </div>

        <div class="footer">
            <span>Phone: (555) 012-3456</span>
            <span>://smithmedical.com</span>
        </div>
    </div>
</body>
</html>


<div class="card p-3 border-0 shadow-sm mb-3 bg-white">
    <div class="row g-2 align-items-center">

        <!-- 1. Brand Name (Label + Icon + Input) -->
        <div class="col-md-3">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-primary"></i></span>
                <input type="text" class="form-control border-start-0" placeholder="Medicine name">
            </div>
        </div>

        <!-- 3. Dosage (1+0+1 Style) -->
        <div class="col-md-3">
            <div class="d-flex align-items-center border rounded px-2 bg-white" style="height: 38px;">
                <select class="form-select form-select-sm border-0 bg-transparent text-center px-1 fw-bold">
                    <option value="0">0</option>
                    <option value="0.5">½</option>
                    <option value="1" selected>1</option>
                </select>
                <span class="text-muted">+</span>
                <select class="form-select form-select-sm border-0 bg-transparent text-center px-1 fw-bold">
                    <option value="0" selected>0</option>
                    <option value="0.5">½</option>
                    <option value="1">1</option>
                </select>
                <span class="text-muted">+</span>
                <select class="form-select form-select-sm border-0 bg-transparent text-center px-1 fw-bold">
                    <option value="0">0</option>
                    <option value="0.5">½</option>
                    <option value="1" selected>1</option>
                </select>
            </div>
        </div>

        <!-- 4. Duration (For) -->
        <div class="col-md-3">
            <div class="input-group">
                <span class="input-group-text bg-white small text-muted">For</span>
                <input type="number" class="form-control" placeholder="7">
                <select class="form-select bg-light fw-bold" style="max-width: 100px;">
                    <option selected>Days</option>
                    <option>Months</option>
                    <option>Weeks</option>
                </select>
            </div>
        </div>

        <!-- 5. Add Button -->
        <div class="col-md-1">
            <button class="btn btn-primary w-100 shadow-sm" title="Add Medicine">
                <i class="bi bi-plus-lg"></i>
            </button>
        </div>

    </div>
</div>
